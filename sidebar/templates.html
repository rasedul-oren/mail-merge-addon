<div id="tab-templates" class="tab-content">
  <!-- Header -->
  <div class="section-header">
    <h2>Templates</h2>
    <button class="btn btn-primary btn-sm" onclick="saveCurrentTemplate()">Save Current</button>
  </div>

  <!-- Template List -->
  <div id="template-list">
    <!-- Templates are rendered dynamically -->
  </div>

  <!-- Empty State -->
  <div id="templates-empty" class="empty-state">
    <div class="empty-icon">&#128196;</div>
    <p>No templates saved yet.<br>Compose an email and click "Save Current" to create one.</p>
  </div>
</div>
