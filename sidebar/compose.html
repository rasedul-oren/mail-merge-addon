<div id="tab-compose" class="tab-content active">
  <!-- From -->
  <div class="form-group">
    <label>From</label>
    <div id="from-email" class="readonly-field">Loading...</div>
  </div>

  <!-- Recipients -->
  <div class="form-group">
    <label>To</label>
    <div id="recipient-count" class="readonly-field">Loading...</div>
  </div>

  <!-- Campaign Name -->
  <div class="form-group">
    <label>Campaign Name</label>
    <input type="text" id="campaign-name" placeholder="e.g., Q1 Outreach - BRSR" />
  </div>

  <!-- Subject -->
  <div class="form-group">
    <label>Subject</label>
    <div class="input-with-button">
      <input type="text" id="email-subject" placeholder="Subject line with {{merge fields}}" />
      <button class="btn-icon" onclick="showMergeFieldPicker('subject')" title="Insert merge field">+</button>
    </div>
  </div>

  <!-- Rich Text Editor -->
  <div class="form-group">
    <label>Body</label>
    <div class="editor-toolbar">
      <button onclick="execCommand('bold')" title="Bold"><b>B</b></button>
      <button onclick="execCommand('italic')" title="Italic"><i>I</i></button>
      <button onclick="execCommand('underline')" title="Underline"><u>U</u></button>
      <span class="toolbar-divider"></span>
      <button onclick="execCommand('insertOrderedList')" title="Numbered list">1.</button>
      <button onclick="execCommand('insertUnorderedList')" title="Bullet list">&#8226;</button>
      <span class="toolbar-divider"></span>
      <button onclick="insertLink()" title="Insert link">&#128279;</button>
      <button class="btn-icon merge-btn" onclick="showMergeFieldPicker('body')" title="Insert merge field">{{ }}</button>
    </div>
    <div id="email-body" class="editor" contenteditable="true" placeholder="Write your email..."></div>
  </div>

  <!-- Merge Field Picker (hidden dropdown) -->
  <div id="merge-field-picker" class="merge-picker hidden">
    <div class="merge-picker-header">Insert Merge Field</div>
    <div id="merge-fields-list"></div>
  </div>

  <!-- Attachments -->
  <div class="form-group">
    <label>Attachments</label>
    <input type="file" id="file-input" multiple onchange="handleAttachment(event)" style="display:none" />
    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('file-input').click()">Attach Files</button>
    <div id="attachment-list" class="attachment-chips"></div>
  </div>

  <!-- Schedule (collapsible) -->
  <details class="form-group">
    <summary>Schedule Send</summary>
    <input type="datetime-local" id="schedule-time" />
    <button class="btn btn-secondary btn-sm" onclick="scheduleSend()">Schedule</button>
  </details>

  <!-- Action Buttons -->
  <div class="action-buttons">
    <button class="btn btn-secondary" onclick="previewEmail()">Preview</button>
    <button class="btn btn-secondary" onclick="sendTest()">Send Test</button>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="sendAll()">Send All</button>
      <button class="btn btn-secondary" onclick="sendSelected()">Send Selected</button>
    </div>
  </div>
</div>
