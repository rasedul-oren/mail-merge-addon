<style>
  /* ===== CSS Variables ===== */
  :root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --primary-light: #e8f0fe;
    --success: #34a853;
    --success-light: #e6f4ea;
    --warning: #fbbc04;
    --warning-light: #fef7e0;
    --error: #ea4335;
    --error-light: #fce8e6;
    --text: #202124;
    --text-secondary: #5f6368;
    --bg: #ffffff;
    --bg-secondary: #f8f9fa;
    --border: #dadce0;
    --shadow: 0 1px 3px rgba(60,64,67,0.15), 0 1px 2px rgba(60,64,67,0.10);
    --shadow-hover: 0 2px 6px rgba(60,64,67,0.20), 0 2px 4px rgba(60,64,67,0.12);
    --radius: 8px;
    --radius-sm: 4px;
    --transition: 0.2s ease;
  }

  /* ===== Base ===== */
  *, *::before, *::after {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Roboto', 'Google Sans', system-ui, -apple-system, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
    background: var(--bg);
    overflow-x: hidden;
  }

  /* ===== Tab Bar ===== */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .tab-bar button {
    flex: 1;
    padding: 10px 4px 8px;
    border: none;
    background: none;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    position: relative;
    transition: color var(--transition), background var(--transition);
    text-align: center;
    line-height: 1.3;
  }

  .tab-bar button:hover {
    background: var(--bg-secondary);
    color: var(--text);
  }

  .tab-bar button.active {
    color: var(--primary);
  }

  .tab-bar button.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 20%;
    right: 20%;
    height: 3px;
    background: var(--primary);
    border-radius: 3px 3px 0 0;
  }

  .tab-bar .tab-icon {
    display: block;
    font-size: 16px;
    margin-bottom: 2px;
  }

  /* ===== Tab Content ===== */
  .tab-content {
    display: none;
    padding: 12px;
    animation: fadeIn 0.2s ease;
  }

  .tab-content.active {
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== Cards ===== */
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    transition: box-shadow var(--transition);
  }

  .card:hover {
    box-shadow: var(--shadow-hover);
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 6px;
    color: var(--text);
  }

  .card-subtitle {
    font-size: 11px;
    color: var(--text-secondary);
    margin: 0;
  }

  /* ===== Buttons ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px 16px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
    text-decoration: none;
    line-height: 1;
  }

  .btn-primary {
    background: var(--primary);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--primary-dark);
    box-shadow: 0 1px 3px rgba(26,115,232,0.4);
  }

  .btn-secondary {
    background: var(--bg);
    color: var(--primary);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: var(--primary-light);
    border-color: var(--primary);
  }

  .btn-danger {
    background: var(--bg);
    color: var(--error);
    border: 1px solid var(--border);
  }

  .btn-danger:hover {
    background: var(--error-light);
    border-color: var(--error);
  }

  .btn-sm {
    padding: 5px 10px;
    font-size: 12px;
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }

  .btn-icon {
    width: 32px;
    height: 32px;
    padding: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text-secondary);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all var(--transition);
    flex-shrink: 0;
  }

  .btn-icon:hover {
    background: var(--bg-secondary);
    color: var(--text);
    border-color: var(--primary);
  }

  .btn-group {
    display: flex;
    gap: 6px;
  }

  .action-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .action-buttons .btn-group {
    margin-left: auto;
  }

  /* ===== Form ===== */
  .form-group {
    margin-bottom: 12px;
  }

  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .form-group input[type="text"],
  .form-group input[type="email"],
  .form-group input[type="datetime-local"],
  .form-group select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    transition: border-color var(--transition), box-shadow var(--transition);
    outline: none;
  }

  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
  }

  .form-group input::placeholder {
    color: #b0b3b8;
  }

  .readonly-field {
    padding: 8px 10px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text);
  }

  .input-with-button {
    display: flex;
    gap: 4px;
    align-items: stretch;
  }

  .input-with-button input {
    flex: 1;
    min-width: 0;
  }

  .form-group details {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
  }

  .form-group details summary {
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    user-select: none;
  }

  .form-group details[open] summary {
    margin-bottom: 8px;
  }

  .form-group details input {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 6px;
    outline: none;
  }

  .form-group details input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
  }

  /* ===== Range Input ===== */
  .range-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .range-group input[type="range"] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  .range-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--primary);
    cursor: pointer;
  }

  .range-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--primary);
    min-width: 30px;
    text-align: center;
  }

  /* ===== Toggle Switch ===== */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--bg-secondary);
  }

  .toggle-row:last-child {
    border-bottom: none;
  }

  .toggle-label {
    font-size: 13px;
    color: var(--text);
  }

  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
  }

  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: background var(--transition);
  }

  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 2px;
    top: 2px;
    background: var(--bg);
    border-radius: 50%;
    transition: transform var(--transition);
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }

  .toggle input:checked + .toggle-slider {
    background: var(--primary);
  }

  .toggle input:checked + .toggle-slider::before {
    transform: translateX(16px);
  }

  /* ===== Status Badges ===== */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .badge-sent { background: var(--bg-secondary); color: var(--text-secondary); }
  .badge-opened { background: var(--success-light); color: var(--success); }
  .badge-clicked { background: var(--primary-light); color: var(--primary); }
  .badge-bounced { background: var(--error-light); color: var(--error); }

  /* ===== Stat Cards ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .stat-card {
    border-radius: var(--radius);
    padding: 10px;
    text-align: center;
  }

  .stat-card .stat-number {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
  }

  .stat-card .stat-percent {
    font-size: 11px;
    font-weight: 500;
    opacity: 0.8;
  }

  .stat-card .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
    font-weight: 500;
  }

  .stat-sent { background: var(--bg-secondary); color: var(--text-secondary); }
  .stat-sent .stat-number { color: var(--text); }

  .stat-opens { background: var(--success-light); color: var(--success); }
  .stat-opens .stat-number { color: var(--success); }

  .stat-clicks { background: var(--primary-light); color: var(--primary); }
  .stat-clicks .stat-number { color: var(--primary); }

  .stat-bounces { background: var(--error-light); color: var(--error); }
  .stat-bounces .stat-number { color: var(--error); }

  /* ===== Bar Chart ===== */
  .chart-section {
    margin-bottom: 12px;
  }

  .chart-section h3 {
    font-size: 12px;
    font-weight: 600;
    margin: 0 0 8px;
    color: var(--text);
  }

  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .bar-label {
    width: 55px;
    font-size: 11px;
    color: var(--text-secondary);
    flex-shrink: 0;
  }

  .bar-track {
    flex: 1;
    height: 8px;
    background: var(--bg-secondary);
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
    min-width: 0;
  }

  .bar-fill-opens { background: var(--success); }
  .bar-fill-clicks { background: var(--primary); }
  .bar-fill-bounces { background: var(--error); }

  .bar-value {
    width: 36px;
    font-size: 11px;
    font-weight: 600;
    text-align: right;
    flex-shrink: 0;
  }

  /* ===== Scrollable Table ===== */
  .table-container {
    max-height: 250px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
  }

  .table-container table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }

  .table-container thead {
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .table-container th {
    background: var(--bg-secondary);
    color: var(--text-secondary);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    font-size: 10px;
    padding: 8px 6px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  .table-container td {
    padding: 6px;
    border-bottom: 1px solid var(--bg-secondary);
    vertical-align: middle;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .table-container tr:last-child td {
    border-bottom: none;
  }

  .table-container tr:hover td {
    background: var(--bg-secondary);
  }

  /* ===== Rich Text Editor ===== */
  .editor-toolbar {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 4px;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    background: var(--bg-secondary);
    flex-wrap: wrap;
  }

  .editor-toolbar button {
    width: 28px;
    height: 28px;
    padding: 0;
    border: none;
    border-radius: var(--radius-sm);
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: all var(--transition);
  }

  .editor-toolbar button:hover {
    background: var(--border);
    color: var(--text);
  }

  .editor-toolbar button:active {
    background: var(--primary-light);
    color: var(--primary);
  }

  .editor-toolbar .merge-btn {
    font-size: 10px;
    font-weight: 700;
    width: auto;
    padding: 0 6px;
    color: var(--primary);
  }

  .toolbar-divider {
    width: 1px;
    height: 18px;
    background: var(--border);
    margin: 0 2px;
  }

  .editor {
    min-height: 150px;
    max-height: 300px;
    overflow-y: auto;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 0 0 var(--radius-sm) var(--radius-sm);
    font-size: 13px;
    line-height: 1.6;
    outline: none;
    color: var(--text);
    background: var(--bg);
    transition: border-color var(--transition), box-shadow var(--transition);
  }

  .editor:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
  }

  .editor:empty::before {
    content: attr(placeholder);
    color: #b0b3b8;
    pointer-events: none;
  }

  /* ===== Merge Field Picker ===== */
  .merge-picker {
    position: absolute;
    width: calc(100% - 24px);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-hover);
    z-index: 200;
    max-height: 200px;
    overflow-y: auto;
  }

  .merge-picker.hidden {
    display: none;
  }

  .merge-picker-header {
    padding: 8px 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .merge-picker .merge-field-item {
    padding: 8px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: background var(--transition);
    border-bottom: 1px solid var(--bg-secondary);
  }

  .merge-picker .merge-field-item:last-child {
    border-bottom: none;
  }

  .merge-picker .merge-field-item:hover {
    background: var(--primary-light);
    color: var(--primary);
  }

  .merge-picker .merge-field-item code {
    font-size: 10px;
    background: var(--bg-secondary);
    padding: 1px 4px;
    border-radius: 2px;
    margin-left: 6px;
    color: var(--text-secondary);
  }

  /* ===== Attachment Chips ===== */
  .attachment-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }

  .attachment-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 11px;
    color: var(--text);
    max-width: 100%;
  }

  .attachment-chip .chip-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 180px;
  }

  .attachment-chip .chip-remove {
    width: 14px;
    height: 14px;
    border: none;
    background: var(--text-secondary);
    color: var(--bg);
    border-radius: 50%;
    font-size: 10px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 1;
    padding: 0;
    transition: background var(--transition);
  }

  .attachment-chip .chip-remove:hover {
    background: var(--error);
  }

  /* ===== Modal Overlay ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 16px;
    animation: modalFadeIn 0.2s ease;
  }

  .modal-overlay.visible {
    display: flex;
  }

  @keyframes modalFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal-card {
    background: var(--bg);
    border-radius: var(--radius);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    width: 100%;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: modalSlideUp 0.2s ease;
  }

  @keyframes modalSlideUp {
    from { transform: translateY(16px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 14px;
  }

  .modal-close {
    width: 28px;
    height: 28px;
    border: none;
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: background var(--transition);
  }

  .modal-close:hover {
    background: var(--bg-secondary);
  }

  .modal-body {
    padding: 16px;
    overflow-y: auto;
    flex: 1;
    font-size: 13px;
    line-height: 1.6;
  }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }

  /* ===== Toast ===== */
  .toast-container {
    position: fixed;
    bottom: 12px;
    left: 12px;
    right: 12px;
    z-index: 2000;
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: none;
  }

  .toast {
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 500;
    box-shadow: var(--shadow-hover);
    pointer-events: auto;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast-success {
    background: var(--success);
    color: #fff;
  }

  .toast-error {
    background: var(--error);
    color: #fff;
  }

  .toast-info {
    background: var(--text);
    color: #fff;
  }

  @keyframes toastIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  @keyframes toastOut {
    from { opacity: 1; }
    to { opacity: 0; transform: translateY(-10px); }
  }

  /* ===== Loading Spinner ===== */
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  .spinner-lg {
    width: 32px;
    height: 32px;
    border-width: 3px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 24px;
    color: var(--text-secondary);
    font-size: 12px;
  }

  /* ===== Progress Bar ===== */
  .progress-bar-container {
    width: 100%;
    margin: 8px 0;
  }

  .progress-bar-track {
    width: 100%;
    height: 6px;
    background: var(--bg-secondary);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 3px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .progress-text {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 4px;
    text-align: center;
  }

  .progress-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.95);
    z-index: 900;
    flex-direction: column;
    align-items: center;
    justify-content: center;
